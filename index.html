<!DOCTYPE html>
<html class="mdui-theme-auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://static.1503dev.top/ajax/mdui/2.1.3/mdui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined">
    <script src="https://static.1503dev.top/ajax/mdui/2.1.3/mdui.global.js" defer=""></script>
    <title>HackMCPE</title>
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        mdui-top-app-bar {
            flex-shrink: 0;
        }
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            overflow: hidden;
        }
        mdui-card {
            width: 100%;
            max-width: 800px;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .search-field {
            width: 100%;
            flex-shrink: 0;
        }
        .search-wrapper {
            padding: 8px 16px;
            flex-shrink: 0;
        }
        #data-list {
            overflow-y: auto;
            flex: 1;
            min-height: 0;
            padding: 0;
        }
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            gap: 12px;
            flex-shrink: 0;
        }
        #page-info {
            font-size: 14px;
            color: rgb(var(--mdui-color-on-surface-variant));
        }
        footer {
            text-align: center;
            padding: 12px;
            font-size: 12px;
            color: rgb(var(--mdui-color-on-surface-variant));
            flex-shrink: 0;
        }
        footer a {
            color: rgb(var(--mdui-color-primary));
            text-decoration: none;
        }
        .desc-text {
            font-size: 12px;
            color: rgb(var(--mdui-color-on-surface-variant));
        }
        .item-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }
        .dialog-img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 16px;
            display: block;
        }
        #dialog-info-text {
            line-height: 1.6;
            word-break: break-all;
        }
        .spacer {
            flex: 1;
        }
    </style>
</head>
<body>
    <mdui-top-app-bar>
        <mdui-top-app-bar-title>HackMCPE</mdui-top-app-bar-title>
    </mdui-top-app-bar>

    <div class="main-container">
        <mdui-card variant="elevated">
            <mdui-linear-progress id="loading-bar" style="display: none;"></mdui-linear-progress>
            <div class="search-wrapper">
                <mdui-text-field class="search-field" placeholder="搜索..." icon="search--outlined" clearable></mdui-text-field>
            </div>
            <mdui-list id="data-list"></mdui-list>
            <div class="pagination-container">
                <mdui-button-icon id="prev-btn" icon="chevron_left--outlined"></mdui-button-icon>
                <span id="page-info"></span>
                <mdui-button-icon id="next-btn" icon="chevron_right--outlined"></mdui-button-icon>
            </div>
        </mdui-card>
    </div>

    <mdui-dialog id="detail-dialog" close-on-overlay-click>
        <span slot="headline" id="dialog-title"></span>
        <div id="dialog-content">
            <img id="dialog-img" class="dialog-img" src="" alt="Preview" style="display: none;">
            <div id="dialog-info-text"></div>
        </div>
        <mdui-button slot="action" variant="text" id="github-proxy-btn" style="display: none;margin-left:0">代理下载</mdui-button>
        <div slot="action" class="spacer"></div>
        <mdui-button slot="action" variant="text" id="dialog-cancel-btn">取消</mdui-button>
        <mdui-button slot="action" variant="tonal" id="dialog-download-btn">下载</mdui-button>
    </mdui-dialog>

    <mdui-dialog id="proxy-dialog" close-on-overlay-click>
        <span slot="headline" id="proxy-dialog-title"></span>
        <div id="proxy-dialog-content">
            Github 加速下载服务由 <a href="https://gh-proxy.org/" target="_blank">GH-Proxy</a> 提供
        </div>
        <mdui-button slot="action" variant="text" onclick="document.getElementById('proxy-dialog').open = false">取消</mdui-button>
        <mdui-button slot="action" variant="tonal" id="proxy-confirm-btn">下载</mdui-button>
    </mdui-dialog>

    <footer>
        Copyright 2023-2026 <a href="https://1503dev.top" target="_blank">1503Dev</a><br>
        <span id="statistics"></span>
    </footer>
    
    <script>
        function statisticsCallback(data){
            document.getElementById('statistics').textContent = data.total + " Views"
        }
    </script>
    <script src="https://api1.1503dev.top/legacy_visits_statistics/?callback=statisticsCallback&tag=adec7ca51e12b0e0f17c9a30222ef9c8" defer></script>
    <script>
        let totalData = [];
        let filteredData = [];
        const itemsPerPage = 10;
        let currentPage = 1;

        const listElement = document.getElementById('data-list');
        const pageInfo = document.getElementById('page-info');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const searchField = document.querySelector('.search-field');
        const loadingBar = document.getElementById('loading-bar');

        const dialog = document.getElementById('detail-dialog');
        const dialogTitle = document.getElementById('dialog-title');
        const dialogImg = document.getElementById('dialog-img');
        const dialogInfoText = document.getElementById('dialog-info-text');
        const dialogDownloadBtn = document.getElementById('dialog-download-btn');
        const dialogCancelBtn = document.getElementById('dialog-cancel-btn');
        const githubProxyBtn = document.getElementById('github-proxy-btn');

        const proxyDialog = document.getElementById('proxy-dialog');
        const proxyDialogTitle = document.getElementById('proxy-dialog-title');
        const proxyConfirmBtn = document.getElementById('proxy-confirm-btn');

        async function loadData() {
            loadingBar.style.display = 'block';
            try {
                const response = await fetch('./data.json');
                totalData = await response.json();
                filteredData = totalData;
                renderList();
            } catch (error) {
                totalData = [];
                filteredData = [];
                renderList();
            }
            loadingBar.style.display = 'none';
        }

        function renderList() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = filteredData.slice(start, end);

            listElement.innerHTML = '';
            if (pageData.length === 0) {
                listElement.innerHTML = '<mdui-list-item>暂无数据</mdui-list-item>';
            } else {
                pageData.forEach((item) => {
                    const listItem = document.createElement('mdui-list-item');
                    listItem.setAttribute('headline-line', '1');
                    listItem.setAttribute('description-line', '1');
                    listItem.setAttribute('clickable', '');
                    listItem.style.padding = "0";
                    listItem.innerHTML = `
                        <span class="item-name">${item.name}</span>
                        <span slot="description" class="desc-text">${item.desc}</span>
                    `;
                    listItem.addEventListener('click', () => showDetails(item));
                    listElement.appendChild(listItem);
                });
            }

            const totalPages = Math.max(1, Math.ceil(filteredData.length / itemsPerPage));
            pageInfo.textContent = `第 ${currentPage} / ${totalPages} 页`;

            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages || totalPages === 0;
        }

        function showDetails(item) {
            dialogTitle.textContent = item.name;
            const infoContent = item.info || item.desc || "";
            dialogInfoText.innerHTML = infoContent.replace(/\n/g, '<br>');
            dialogImg.style.display = 'none';
            
            const isGithubRelease = item.href.includes('github.com') && item.href.includes('/releases/');
            githubProxyBtn.style.display = isGithubRelease ? 'inline-block' : 'none';

            const imgPathPng = `./img/${item.name}.png`;
            const imgPathJpg = `./img/${item.name}.jpg`;
            const img = new Image();
            img.onload = () => {
                dialogImg.src = img.src;
                dialogImg.style.display = 'block';
            };
            img.onerror = () => {
                if (img.src.endsWith('.png')) {
                    img.src = imgPathJpg;
                } else {
                    dialogImg.style.display = 'none';
                }
            };
            img.src = imgPathPng;

            dialogDownloadBtn.onclick = () => window.open(item.href, '_blank');
            dialogCancelBtn.onclick = () => dialog.open = false;

            githubProxyBtn.onclick = () => {
                proxyDialogTitle.textContent = item.name + "";
                proxyConfirmBtn.onclick = () => {
                    window.open('https://gh-proxy.org/' + item.href, '_blank');
                };
                proxyDialog.open = true;
            };

            dialog.open = true;
        }

        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderList();
            }
        });

        nextBtn.addEventListener('click', () => {
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderList();
            }
        });

        searchField.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            if (keyword === '') {
                filteredData = totalData;
            } else {
                filteredData = totalData.filter(item => {
                    return (item.name || "").toLowerCase().includes(keyword) || 
                           (item.desc || "").toLowerCase().includes(keyword) || 
                           (item.info || "").toLowerCase().includes(keyword);
                });
            }
            currentPage = 1;
            renderList();
        });

        loadData();
    </script>
</body>
</html>
